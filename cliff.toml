## [2.0.14] - 2026-02-23

###  Bug Fixes

- *(backend)* Force redirect of Refined issue view links

> - Forcing refined issue view links to redirect to OOTB Jira links
>
> - Example: /plugins/servlet/desk/portal/14/WMPR-8149 to /servicedesk/customer/portal/14/WMPR-8149



## [2.0.13] - 2026-02-20

###  Bug Fixes

- *(backend)* Updating JQL tables to only call facets once per JQL search and again on text search filter

> - Compute facets across the full JQL match-set once per (JQL + searchTerm)
>
> - Do NOT include facets on status/priority filters or sorting
>
> - These changes reduce the amount of API calls



## [2.0.12] - 2026-02-20

###  Bug Fixes

- *(frontend)* Allow project names to display fully without truncation in portal header

> - Remove max-width constraint and truncate class from project name badge
>
> - Project names like "FEDX (Fab Engineering Digital Transformation) - Tickets" now display fully
>
> - Text remains on single line without wrapping


- *(frontend)* Update results count in JQL tables for when results = 0

> - Results count appends a trailing 0 to the results count string when there are no issues returned (i.e., "Showing 0 results0")
>
> - Fix to removing trailing 0 (i.e., "Showing 0 results")



###  Features

- *(frontend)* Switch to server-side sorting + facet-driven filters for landing page JQL tables

> - Send sortField and sortDir to backend in JQL mode
>
> - Request facets for full-result filter options
>
> - Remove client-only sorting in JQL mode
>
> - Populate status/priority filters from server facets
>
> - Reset page on sort change



###  Refactor

- *(backend)* Updating redirect link when skipRail=true

> - Updating the redirect link that appears when you hit a RAIL portal URL (i.e., /plugins/servlet/customer-rail/{projectKey}) for a portal that is no longer live
>
> - Changing from Refined portal link to Jira OOTB portal link (i.e., /servicedesk/customer/portal/{portalId}/?skipRail=true



## [2.0.11] - 2026-02-19

###  Refactor

- *(ui)* Updating JQL table columns to use an accurate up or down arrow when sorting depending on if it is asc or desc



## [2.0.10] - 2026-02-19

###  Features

- *(backend)* JQL table filters use global JQL ORDER BY + status/priority facets

> - Add sortField and sortDir support to IssueService.searchIssues()
>
> - Apply safe ORDER BY rewrite (allow-listed fields only)
>
> - Compute status/priority facets across full JQL match-set
>
> - Add bounded facet scan for Data Center safety
>
> - Extend IssueSearchResponseDTO with facets


- *(frontend)* Switch to server-side sorting + facet-driven filters

> - Send sortField and sortDir to backend in JQL mode
>
> - Request facets for full-result filter options
>
> - Remove client-only sorting in JQL mode
>
> - Populate status/priority filters from server facets
>
> - Reset page on sort change



## [2.0.9] - 2026-02-19

###  Features

- *(ui)* Adding info chip to the landing page that routes to our confluence documentation



###  Refactor

- *(ui)* Updating the "Need Help" link in the portal builder to route to the new portal builder doc link



## [2.0.8] - 2026-02-17

###  Bug Fixes

- *(backend)* Correctly resolve global custom field contexts

> - Updating GET /rest/rail/1.0/projects/{projectKey}/fields to include global context
>
> - Replace cf.getAssociatedProjectObjects() using getConfigurationSchemes()
>
> - Ensures custom fields with global + scoped contexts are correctly included for all applicable projects (e.g., Change Start Date/Time in PLASMA)



## [2.0.7] - 2026-02-13

###  Bug Fixes

- *(portal-jql-table)* Use issue-level serviceDeskId for customer portal links

> Previously, JQL table links in a project portal used the portal-level serviceDeskId,
>
> causing non-JSM issues to incorrectly resolve to
>
> /servicedesk/customer/portal/{id}/{issueKey} and return 404.
>
> 
>
> Now links are determined per issue using issue.serviceDeskId,
>
> falling back to /browse/{issueKey} for non-JSM issues.
>
> 
>
> This matches the functionality used on the home/ladning page



## [2.0.6] - 2026-02-13

###  Bug Fixes

- *(frontend)* Intercept /servicedesk/customer/portals to force hard navigation for RAIL redirect

> JSM breadcrumb navigation to /servicedesk/customer/portals uses SPA routing,
>
> which prevents the RailCustomerPortalRedirectFilter from executing.
>
> 
>
> This update extends rail-portal-intercept.js to:
>
> - Intercept navigation to /servicedesk/customer/portals
>
> - Force a full page reload
>
> - Allow server-side redirect to /plugins/servlet/customer-rail
>
> 
>
> Also improves anchor detection using closest('a[href]') and normalizes path comparisons.



###  Refactor

- *(frontend)* Display only JSM issues in JQL tables

> Changing the JQL query used for the JQL tables on the landing page to only include JSM/Service Desk issues
>
> - `AND project in projectsOfType('service_desk')`



