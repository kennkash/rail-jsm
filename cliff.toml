# --------------------------------------------------------------------




# cliff.toml
# --------------------------------------------------------------------
# This file configures git-cliff changelog generation for the
# RAIL Portal Plugin.
#
# The build-and-deploy script depends on this configuration.
#
# Commit messages MUST follow Conventional Commits format:
#   type(scope): description
#
# Example:
#   feat(nav): Redirect Refined Links
#   fix(ui): Correct sidebar hover state
#
# Only conventional commits are included in CHANGELOG.md.
# Release commits (chore(release): ...) are intentionally skipped.
#
# If changelog formatting needs to change,
# update this file — NOT CHANGELOG.md directly.
# --------------------------------------------------------------------


[changelog]
# changelog header
header = """
# Changelog\n
All notable changes to the RAIL Portal Plugin will be documented in this file.\n
"""
# template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{commit.scope}})* {% endif %}{{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
# template for the changelog footer
footer = """
"""
# remove the leading and trailing whitespace from the templates
trim = true

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = true
# process each line of a commit as an individual commit
split_commits = false
# regex for parsing and grouping commits
commit_parsers = [
    { message = "^feat", group = " Features" },
    { message = "^fix", group = " Bug Fixes" },
    { message = "^doc", group = " Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = " Refactor" },
    { message = "^style", group = " Styling" },
    { message = "^test", group = "離 Testing" },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^chore", group = "⚙️ Maintenance" },
    { message = ".*", group = "⭐ Other" },
]
# protect breaking changes from being skipped due to matching a skipping commit_parser
protect_breaking_commits = false
# filter out the commits that are not matched by commit_parsers
filter_commits = false
# glob pattern for matching git tags
tag_pattern = "v[0-9]*"
# sort the tags topologically
topo_order = false
# sort the commits inside sections by oldest/newest order
sort_commits = "oldest"
